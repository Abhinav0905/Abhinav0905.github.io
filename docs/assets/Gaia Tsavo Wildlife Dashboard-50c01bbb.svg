<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Tsavo Wildlife conservation dashboard preview</title>
  <desc id="desc">A stylized conservation analytics dashboard for camera-trap uploads, detected animals, species, alerts, and activity patterns.</desc>
  <defs>
    <linearGradient id="header" x1="0" x2="1">
      <stop offset="0" stop-color="#1f7a34"/>
      <stop offset="1" stop-color="#2f8f3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#f3f6f2"/>
  <rect width="245" height="720" fill="#ffffff"/>
  <text x="40" y="84" fill="#277a2f" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Tsavo Wildlife</text>
  <rect x="0" y="136" width="245" height="64" fill="#60ad5c"/>
  <g fill="#1f2937" font-family="Inter, Arial, sans-serif" font-size="24">
    <text x="74" y="178" fill="#ffffff">Dashboard</text>
    <text x="74" y="250">Camera Trap</text>
    <text x="74" y="320">Lion Tracking</text>
    <text x="74" y="390">Analytics</text>
    <text x="74" y="460">Model Compare</text>
    <text x="74" y="530">Reports</text>
  </g>
  <rect x="245" width="955" height="92" fill="url(#header)"/>
  <text x="292" y="57" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34">Dashboard</text>
  <text x="292" y="168" fill="#15171a" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="850">Conservation Dashboard</text>
  <rect x="292" y="208" width="848" height="52" rx="8" fill="#dff3fb"/>
  <text x="346" y="242" fill="#15506d" font-family="Inter, Arial, sans-serif" font-size="22">Upload camera-trap images to populate wildlife insights.</text>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="292" y="292" width="190" height="160" rx="16" fill="#ffffff"/>
    <text x="314" y="340" fill="#6b7280" font-size="20">Total Images</text>
    <text x="314" y="384" fill="#171717" font-size="44" font-weight="850">1,315</text>
    <text x="314" y="418" fill="#6b7280" font-size="20">Processed uploads</text>
    <circle cx="430" cy="375" r="38" fill="#4caf50"/>
    <rect x="405" y="356" width="26" height="28" rx="2" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M410 379l8-8 7 6 6-10 13 16" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="512" y="292" width="200" height="160" rx="16" fill="#ffffff"/>
    <text x="534" y="340" fill="#6b7280" font-size="20">Last Upload</text>
    <text x="534" y="382" fill="#171717" font-size="36" font-weight="850">Jun 21</text>
    <text x="534" y="416" fill="#6b7280" font-size="20">Latest processed image</text>
    <circle cx="664" cy="374" r="38" fill="#2196f3"/>
    <circle cx="664" cy="374" r="19" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M664 362v13l10 8" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="742" y="292" width="200" height="160" rx="16" fill="#ffffff"/>
    <text x="764" y="340" fill="#6b7280" font-size="20">Detected Animals</text>
    <text x="764" y="384" fill="#171717" font-size="44" font-weight="850">192</text>
    <text x="764" y="418" fill="#6b7280" font-size="20">Last 30 days</text>
    <circle cx="894" cy="374" r="38" fill="#ff9800"/>
    <path d="M872 392l16-22 15 12 18-24" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="972" y="292" width="168" height="160" rx="16" fill="#ffffff"/>
    <text x="994" y="340" fill="#6b7280" font-size="20">Species</text>
    <text x="994" y="384" fill="#171717" font-size="44" font-weight="850">6</text>
    <text x="994" y="418" fill="#6b7280" font-size="20">Unique species</text>
    <circle cx="1092" cy="374" r="38" fill="#9c27b0"/>
    <circle cx="1082" cy="367" r="6" fill="#ffffff"/>
    <circle cx="1094" cy="359" r="6" fill="#ffffff"/>
    <circle cx="1106" cy="368" r="6" fill="#ffffff"/>
    <path d="M1077 394c5-15 12-22 21-22s17 8 22 22c-8 4-15 6-22 6s-14-2-21-6z" fill="#ffffff"/>
  </g>
  <rect x="292" y="502" width="848" height="150" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <text x="324" y="558" fill="#202124" font-family="Inter, Arial, sans-serif" font-size="32">24-Hour Activity Pattern</text>
  <g stroke="#d1d5db" stroke-width="2" stroke-dasharray="7 7">
    <line x1="360" y1="602" x2="1084" y2="602"/>
    <line x1="470" y1="582" x2="470" y2="634"/>
    <line x1="620" y1="582" x2="620" y2="634"/>
    <line x1="770" y1="582" x2="770" y2="634"/>
    <line x1="920" y1="582" x2="920" y2="634"/>
  </g>
  <path d="M360 628c60-34 112 28 174-8 58-34 96-42 154-7 70 42 124 28 176-10 54-39 118-18 220 14" fill="none" stroke="#2e7d32" stroke-width="8" stroke-linecap="round"/>
</svg>
